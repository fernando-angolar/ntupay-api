spring:
  application:
    name: ntupay-api
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${API_PORT:8080}

ntupay:
  activation:
    base-url: ${ACTIVATION_BASE_URL:http://localhost:5173/activate}
